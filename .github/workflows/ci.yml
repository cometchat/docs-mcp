name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  build-index:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          path: cometchat-mcp

      - uses: actions/checkout@v4
        with:
          repository: cometchat/docs
          path: cometchat-docs
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cometchat-mcp/package-lock.json

      - name: Install
        working-directory: cometchat-mcp
        run: npm ci

      - name: Build search index
        working-directory: cometchat-mcp
        env:
          DOCS_REPO: ${{ github.workspace }}/cometchat-docs
          INDEX_PATH: ${{ github.workspace }}/cometchat-mcp/data/index.sqlite
        run: npm run build:index

      - uses: actions/upload-artifact@v4
        with:
          name: search-index
          path: cometchat-mcp/data/index.sqlite
          retention-days: 7
